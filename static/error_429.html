<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demasiadas solicitudes | Juntos por Oriana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #f8d7da 0%, #fff5f5 100%); min-height: 100vh; display: flex; align-items: center; }
        .err-card { max-width: 480px; margin: 0 auto; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-radius: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card err-card p-4 text-center">
            <div class="mb-3">
                <i class="fa-solid fa-hand-paper text-danger" style="font-size: 3.5rem;"></i>
            </div>
            <h2 class="fw-bold text-danger mb-2">¡Ups! Tómate un momento</h2>
            <p class="text-muted mb-4">
                Estás haciendo solicitudes demasiado rápido. Por tu seguridad y la de Oriana, hemos limitado la cantidad de envíos por minuto.
            </p>
            <p class="small text-muted mb-4">
                Espera <strong id="countdown">30</strong> segundos y vuelve a intentarlo.
            </p>
            <a href="/" class="btn btn-danger rounded-pill px-4 fw-bold">
                <i class="fa-solid fa-rotate-left me-2"></i>Volver al inicio
            </a>
        </div>
    </div>
    <script>
        let s = 30;
        const el = document.getElementById('countdown');
        const id = setInterval(() => { s--; el.textContent = s; if (s <= 0) clearInterval(id); }, 1000);
    </script>
</body>
</html>
