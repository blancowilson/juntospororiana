# Configuracion de rate limiting (zonas).
# Estas directivas DEBEN ir en el bloque http {} de /etc/nginx/nginx.conf
# NO dentro de un server {}. Este archivo es solo documentacion de referencia.

# Zona para el formulario de donacion: 5 req/min, burst 10
# limit_req_zone $binary_remote_addr zone=donations:10m rate=5r/m;

# Zona para la compra de tickets: 3 req/min, burst 5 (mas estricto)
# limit_req_zone $binary_remote_addr zone=tickets:10m rate=3r/m;

# Zona general para todo el sitio: 30 req/min, burst 50
# limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;

# Nota: la instalacion automatica agrega estas directivas a /etc/nginx/nginx.conf
# dentro del bloque http {}. Ver /tmp/install_ratelimit.sh durante el deploy.
