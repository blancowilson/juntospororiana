server {
    listen 80;
    server_name juntospororiana.online www.juntospororiana.online;

    # Tamano maximo para uploads (conciliacion de archivos Excel/CSV)
    client_max_body_size 10M;

    # Archivos estaticos servidos directamente por Nginx
    location /static/ {
        alias /var/www/juntospororiana/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Favicon
    location = /favicon.ico {
        alias /var/www/juntospororiana/static/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # Proxy al backend FastAPI
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
}
