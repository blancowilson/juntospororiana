server {
    listen 80;
    server_name juntospororiana.online www.juntospororiana.online;

    # Tamano maximo para uploads (conciliacion de archivos Excel/CSV)
    client_max_body_size 10M;

    # Logs (los formatos personalizados deben ir en nginx.conf, no aqui)
    access_log /var/log/nginx/jpo_access.log;
    error_log /var/log/nginx/jpo_error.log;

    # Archivos estaticos servidos directamente por Nginx (sin rate limit estricto)
    location /static/ {
        alias /var/www/juntospororiana/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Favicon
    location = /favicon.ico {
        alias /var/www/juntospororiana/static/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # Rate limit estricto para donacion: 5 req/min con burst de 10
    # Devuelve 429 Too Many Requests al exceder
    location = /aportar/directo {
        limit_req zone=donations burst=10 nodelay;
        limit_req_status 429;
        limit_conn addr 5;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Rate limit MUY estricto para compra de tickets: 3 req/min con burst de 5
    # (un bot podria agotar los 1000 tickets)
    location = /ticket/comprar-aleatorio {
        limit_req zone=tickets burst=5 nodelay;
        limit_req_status 429;
        limit_conn addr 3;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Rate limit general para el resto del sitio
    location / {
        limit_req zone=general burst=50 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # Pagina de error personalizada para 429
    error_page 429 /static/error_429.html;
    location = /static/error_429.html {
        internal;
    }
}
